<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>高難易度クイズ</title>
<style>
body{
  margin:0;
  font-family:sans-serif;
  background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  color:white;
}
.container{
  background:rgba(0,0,0,0.85);
  padding:20px;
  border-radius:15px;
  width:360px;
  text-align:center;
}
button{
  width:100%;
  margin-top:8px;
  padding:10px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}
.choice{background:#eee;color:black;}
#nextBtn{background:#2196f3;color:white;display:none;}
</style>
</head>
<body>

<div class="container">
  <h2>🧠 高難易度クイズ</h2>
  <div id="q"></div>
  <div id="choices"></div>
  <div id="result"></div>
  <div id="score"></div>
  <button id="nextBtn" onclick="next()">次へ</button>
</div>

<script>
const quizData = [
{q:"ピタゴラスの定理はどれ？",c:["a+b=c","a²+b²=c²","a×b=c","a-b=c"],a:1},
{q:"√2はどの数？",c:["有理数","無理数","整数","自然数"],a:1},
{q:"関数y=2x+5の傾きは？",c:["2","5","7","-2"],a:0},
{q:"log10(1000)の値は？",c:["2","3","10","1000"],a:1},
{q:"sin30°の値は？",c:["1/2","√2/2","1","0"],a:0},

{q:"水の化学式は？",c:["CO2","H2O","O2","NaCl"],a:1},
{q:"酸素の元素記号は？",c:["Ox","O","Os","Om"],a:1},
{q:"1モルは約いくつ？",c:["6.0×10^23","3.0×10^8","9.8","1.6×10^-19"],a:0},
{q:"pH7は何性？",c:["酸性","中性","アルカリ性","強酸性"],a:1},
{q:"鉄の元素記号は？",c:["Fe","Ir","Fr","F"],a:0},

{q:"光の速さは約？",c:["30万km/s","3万km/s","300km/s","3億km/s"],a:0},
{q:"重力加速度は約？",c:["9.8","1.6","3.0","12"],a:0},
{q:"電圧の単位は？",c:["A","V","Ω","W"],a:1},
{q:"ニュートンの第2法則は？",c:["F=ma","E=mc²","V=IR","pV=nRT"],a:0},
{q:"エネルギー保存の法則は何の法則？",c:["保存則","運動則","熱則","力学則"],a:0},

{q:"フランス革命が始まった年は？",c:["1776","1789","1804","1815"],a:1},
{q:"アメリカ独立年は？",c:["1776","1789","1800","1750"],a:0},
{q:"江戸幕府を開いたのは？",c:["織田信長","豊臣秀吉","徳川家康","足利尊氏"],a:2},
{q:"三権分立に含まれないのは？",c:["立法","行政","司法","軍事"],a:3},
{q:"日本国憲法施行年は？",c:["1945","1946","1947","1948"],a:2},

{q:"英語で『環境』は？",c:["Energy","Environment","Event","Element"],a:1},
{q:"英語で『増加』は？",c:["Decrease","Increase","Reduce","Drop"],a:1},
{q:"英語で『証拠』は？",c:["Proof","Test","Trial","Check"],a:0},
{q:"英語で『原因』は？",c:["Result","Effect","Cause","Reasoning"],a:2},
{q:"英語で『解決』は？",c:["Solve","Resolve","Decision","Answer"],a:1},

{q:"世界最大の大陸は？",c:["アフリカ","ユーラシア","北アメリカ","南アメリカ"],a:1},
{q:"世界最高峰は？",c:["K2","エベレスト","キリマンジャロ","マッキンリー"],a:1},
{q:"日本一長い川は？",c:["利根川","信濃川","石狩川","淀川"],a:1},
{q:"地球の自転周期は？",c:["12時間","24時間","48時間","365日"],a:1},
{q:"円周率πは約？",c:["2.14","3.14","4.13","1.41"],a:1}
];

let current=0,score=0,shuffled=[];

function shuffle(a){return a.sort(()=>Math.random()-0.5);}

function start(){
  shuffled=shuffle([...quizData]);
  current=0;score=0;
  show();
}

function show(){
  document.getElementById("result").textContent="";
  document.getElementById("nextBtn").style.display="none";

  const q=shuffled[current];
  document.getElementById("q").textContent=`Q${current+1}: ${q.q}`;

  const div=document.getElementById("choices");
  div.innerHTML="";

  q.c.forEach((c,i)=>{
    const b=document.createElement("button");
    b.textContent=c;
    b.className="choice";
    b.onclick=()=>answer(i);
    div.appendChild(b);
  });

  document.getElementById("score").textContent=`スコア: ${score}`;
}

function answer(i){
  const q=shuffled[current];
  document.querySelectorAll(".choice").forEach(b=>b.disabled=true);

  if(i===q.a){
    document.getElementById("result").textContent="⭕ 正解";
    score++;
  }else{
    document.getElementById("result").textContent="❌ 不正解 正解:"+q.c[q.a];
  }

  document.getElementById("nextBtn").style.display="block";
}

function next(){
  current++;
  if(current<shuffled.length){
    show();
  }else{
    document.getElementById("q").textContent="終了";
    document.getElementById("choices").innerHTML="";
    document.getElementById("result").textContent=`最終スコア: ${score}/${shuffled.length}`;
    document.getElementById("nextBtn").textContent="もう一回";
    document.getElementById("nextBtn").onclick=start;
  }
}

start();
</script>
</body>
</html>
